version: "3.8"

services:
  never2-notebook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: never2-notebook
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite database and uploaded images
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/app/data/never2.db
      - UPLOAD_DIR=/app/data/uploads
      - JWT_SECRET=${JWT_SECRET:-never2-notebook-jwt-secret-change-in-production}
      # Volcano OSS (optional)
      - VOLCANO_ACCESS_KEY=${VOLCANO_ACCESS_KEY:-}
      - VOLCANO_SECRET_KEY=${VOLCANO_SECRET_KEY:-}
      - VOLCANO_BUCKET=${VOLCANO_BUCKET:-}
      - VOLCANO_ENDPOINT=${VOLCANO_ENDPOINT:-}
      - VOLCANO_REGION=${VOLCANO_REGION:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
